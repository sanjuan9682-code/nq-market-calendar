<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NQ Market Calendar — Nasdaq 100</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <header class="header">
    <div class="header-top">
      <div class="brand">
        <span class="brand-dot" id="status-dot"></span>
        <span class="brand-title">NQ Market Calendar</span>
        <span class="brand-sub">Nasdaq 100</span>
      </div>
      <div class="controls">
        <button class="btn-filter active" data-scope="today">Hoy</button>
        <button class="btn-filter" data-scope="week">Semana</button>
        <button class="btn-refresh" id="btn-refresh" title="Actualizar">↻</button>
      </div>
    </div>
    <div class="header-date" id="header-date"></div>
    <div class="header-updated" id="header-updated"></div>
  </header>

  <main class="main">
    <!-- Loading -->
    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <div>
        <div class="loading-text">Cargando calendario económico…</div>
        <div class="loading-sub">Consultando fuentes en tiempo real</div>
      </div>
    </div>

    <!-- Error -->
    <div id="error" class="error hidden">
      <div class="error-icon">⚠️</div>
      <div class="error-msg">No se pudo cargar el calendario.</div>
      <button class="btn-retry" id="btn-retry">Reintentar</button>
    </div>

    <!-- Content -->
    <div id="content" class="content">
      <!-- Summary -->
      <div class="summary-card" id="summary-card">
        <div class="summary-label">📊 Sesgo del NQ</div>
        <div class="summary-text" id="summary-text"></div>
      </div>

      <!-- Events -->
      <div id="events-container"></div>

      <!-- Earnings -->
      <div class="section-title">📈 Earnings Tech</div>
      <div id="earnings-container"></div>
    </div>
  </main>

  <footer class="footer">
    Datos vía Finnhub · Actualizado automáticamente · NQ Market Calendar
  </footer>
</div>

<script src="js/app.js"></script>
</body>
</html>
